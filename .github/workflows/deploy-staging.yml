name: CI (staging integration)

# Pure CI for the integration flow: feature branches open PRs into `staging`,
# `staging` promotes into `main`. This workflow verifies every PR and every
# push to `staging` with a full type-check + build.
#
# It deliberately does NOT deploy GitHub Pages: one repository serves one
# Pages site, and this repository's Pages is production (marlonavery.com,
# deployed from `main` by deploy.yml). The staging environment at
# staging.marlonavery.com is served by the separate Main-marlonavery-staging
# repository — promote to it by pushing `staging` there:
#
#   git push staging-origin staging:main

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
